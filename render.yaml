services:
  - type: web
    name: trackibjjf
    env: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn app:app --worker-class gevent --workers 2 --worker-connections 1000 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///ibjjf.db
    disk:
      name: ibjjf-data
      mountPath: /opt/render/project/src/instance
      sizeGB: 1
