<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c0392b">
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0f0f1a; --card:#1e1e30; --gray:#2d2d44; --text:#f0f0f0;
      --muted:#777799; --border:#333355; --accent:#c0392b;
      --gold:#ffd700; --silver:#c0c0c0; --bronze:#cd7f32; --green:#27ae60;
    }
    body { background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
    .container-wide { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; }
    .tag { display: inline-block; font-size: .65rem; padding: .15rem .5rem;
      border-radius: 3px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th { text-align: left; color: var(--muted); font-weight: 600; font-size: .72rem;
      text-transform: uppercase; letter-spacing: .07em;
      padding: .5rem .6rem; border-bottom: 1px solid var(--border); }
    td { padding: .55rem .6rem; border-bottom: 1px solid var(--bg); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray); }
    .section-title { font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--muted); margin: 2rem 0 .75rem;
      display: flex; align-items: center; gap: .5rem; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .btn-go { background: var(--accent); color: #fff; border: none;
      padding: .55rem 1.2rem; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: .9rem; }
    .btn-go:hover { opacity: .85; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border);
      padding: .5rem 1rem; border-radius: 6px; font-weight: 500; cursor: pointer; font-size: .85rem; }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .place-1 { color: var(--gold);   font-weight: 700; }
    .place-2 { color: var(--silver); font-weight: 700; }
    .place-3 { color: var(--bronze); font-weight: 700; }
    .flash { padding: .65rem 1rem; border-radius: 6px; margin: 0 auto 1rem;
      font-size: .9rem; max-width: 960px; }
    .flash.error { background: #4a1f1f; border: 1px solid #7a3232; color: #ffd9d9; }
    .flash.info  { background: #1f3a4a; border: 1px solid #325c7a; color: #d9e8ff; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty-state h3 { color: var(--text); margin-bottom: .5rem; font-weight: 600; }
    .grid { display: grid; gap: 1rem; }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .pill { display: inline-block; font-size: .7rem; padding: .15rem .55rem;
      border-radius: 12px; background: var(--gray); color: var(--text); }
    .pill-green { background: rgba(39,174,96,.18); color: var(--green); }
    .pill-accent { background: rgba(192,57,43,.18); color: var(--accent); }
    .muted { color: var(--muted); font-size: .85rem; }
    @media (max-width: 600px) {
      .container, .container-wide { padding: 1.25rem 1rem; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

{% block translations %}
<script>
const TRANSLATIONS = { en: { nav_subtitle: '{{ site_subtitle|default("") }}' } };
</script>
{% endblock %}

{% include 'shared/header.html' %}

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div style="padding-top: 1rem;">
    {% for cat, msg in messages %}
      <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
    </div>
  {% endif %}
{% endwith %}

{% block body %}{% endblock %}

</body>
</html>
