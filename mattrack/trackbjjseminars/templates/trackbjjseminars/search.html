{% extends "trackbjjseminars/base.html" %}
{% block title %}Search Seminars — TrackBJJSeminars{% endblock %}

{% block head %}
<style>
  .search-bar { display: flex; gap: .5rem; max-width: 600px; margin: 0 auto 2rem; }
  .search-bar input { flex: 1; background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: .65rem 1rem; border-radius: 8px; font-size: .95rem; outline: none; }
  .search-bar input:focus { border-color: var(--accent); }
  .seminar-row { display: flex; justify-content: space-between; align-items: center;
    padding: .85rem 1rem; border-bottom: 1px solid var(--border); cursor: pointer; }
  .seminar-row:hover { background: var(--gray); }
  .seminar-row .title { font-weight: 600; }
  .seminar-row .meta { font-size: .8rem; color: var(--muted); }
  .seminar-row .when { font-size: .85rem; color: var(--accent); font-weight: 600; min-width: 110px; text-align: right; }
</style>
{% endblock %}

{% block body %}
<div class="container">
  <div class="section-title">Search Seminars</div>
  <div class="search-bar">
    <input id="q" type="text" value="{{ q }}" placeholder="Instructor, city, or title…" autocomplete="off">
    <button class="btn-go" id="btn-search">Search</button>
  </div>
  <div id="status" class="muted" style="margin-bottom:1rem"></div>
  <div id="results" class="card" style="padding:0; overflow:hidden"></div>
</div>

<script>
const inp  = document.getElementById('q');
const btn  = document.getElementById('btn-search');
const stat = document.getElementById('status');
const out  = document.getElementById('results');

async function load() {
  const q = inp.value.trim();
  stat.textContent = 'Searching…';
  out.innerHTML = '';
  try {
    const r = await fetch('/api/seminars?limit=100&q=' + encodeURIComponent(q));
    const d = await r.json();
    const rows = d.seminars || [];
    if (!rows.length) { stat.textContent = 'No seminars found.'; return; }
    stat.textContent = rows.length + ' seminar' + (rows.length === 1 ? '' : 's') + ' found.';
    out.innerHTML = rows.map(s => `
      <div class="seminar-row" onclick="location.href='/seminar/${encodeURIComponent(s.slug)}'">
        <div>
          <div class="title">${escapeHtml(s.title)}</div>
          <div class="meta">${escapeHtml(s.instructor_name || '')}${s.city ? ' · ' + escapeHtml(s.city) : ''}${s.state_province ? ', ' + escapeHtml(s.state_province) : ''}</div>
        </div>
        <div class="when">${escapeHtml(s.event_date || '')}</div>
      </div>
    `).join('');
  } catch(e) { stat.textContent = '✗ search failed'; }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

btn.addEventListener('click', load);
inp.addEventListener('keydown', e => { if (e.key === 'Enter') load(); });
if (inp.value.trim()) load(); else load();
</script>
{% endblock %}
