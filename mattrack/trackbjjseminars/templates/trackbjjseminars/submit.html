{% extends "trackbjjseminars/base.html" %}
{% block title %}Submit a Seminar — TrackBJJSeminars{% endblock %}

{% block head %}
<style>
  .form-grid { display: grid; gap: 1rem; max-width: 720px; margin: 0 auto; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-row.full { grid-template-columns: 1fr; }
  .form-grid label { display: block; font-size: .85rem; color: var(--muted); margin-bottom: .3rem; text-transform: uppercase; letter-spacing: .04em; }
  .form-grid input, .form-grid textarea, .form-grid select { width: 100%; box-sizing: border-box;
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: .55rem .8rem; border-radius: 6px; font-size: .9rem; font-family: inherit; outline: none; }
  .form-grid input:focus, .form-grid textarea:focus, .form-grid select:focus { border-color: var(--accent); }
  .form-grid textarea { min-height: 100px; resize: vertical; }
  .submit-bar { display: flex; gap: .5rem; align-items: center; margin-top: 1rem; }
</style>
{% endblock %}

{% block body %}
<div class="container">
  <div class="section-title">Submit a Seminar</div>
  <div class="card" style="max-width: 720px; margin: 0 auto;">
    <p class="muted" style="margin-bottom: 1rem;">All submissions are reviewed before being listed publicly. You must be signed in to submit.</p>
    <form class="form-grid" id="seminar-form">
      <div class="form-row full">
        <div><label>Title *</label><input type="text" name="title" required placeholder="e.g., Marcelo Garcia Guard Seminar"></div>
      </div>
      <div class="form-row full">
        <div><label>Instructor name *</label><input type="text" name="instructor_name" required></div>
      </div>
      <div class="form-row">
        <div><label>Date *</label><input type="date" id="event_date" required></div>
        <div><label>Start time</label><input type="time" id="start_time" value="10:00"></div>
      </div>
      <div class="form-row">
        <div><label>End date</label><input type="date" id="end_date"></div>
        <div><label>End time</label><input type="time" id="end_time"></div>
      </div>
      <div class="form-row">
        <div><label>Venue name</label><input type="text" name="host_venue_name"></div>
        <div><label>City *</label><input type="text" name="host_city" required></div>
      </div>
      <div class="form-row">
        <div><label>State / Province</label><input type="text" name="host_state"></div>
        <div><label>Country</label><input type="text" name="host_country" placeholder="USA"></div>
      </div>
      <div class="form-row full">
        <div><label>Address</label><input type="text" name="host_address"></div>
      </div>
      <div class="form-row">
        <div><label>Format</label><select name="gi_required"><option value="">—</option><option value="true">Gi</option><option value="false">No-Gi</option></select></div>
        <div><label>Skill level</label><select name="level"><option value="All Levels">All Levels</option><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select></div>
      </div>
      <div class="form-row">
        <div><label>Cost (USD)</label><input type="number" name="cost_usd" step="0.01" min="0"></div>
        <div><label>Max attendees</label><input type="number" name="max_attendees" min="1"></div>
      </div>
      <div class="form-row full">
        <div><label>Topic</label><input type="text" name="topic" placeholder="e.g., Half Guard, Footlocks, Wrestling"></div>
      </div>
      <div class="form-row full">
        <div><label>Registration URL</label><input type="url" name="registration_url" placeholder="https://…"></div>
      </div>
      <div class="form-row full">
        <div><label>Flyer URL</label><input type="url" name="flyer_url" placeholder="https://…"></div>
      </div>
      <div class="form-row full">
        <div><label>Description</label><textarea name="description_md" placeholder="What will the seminar cover?"></textarea></div>
      </div>
      <div class="submit-bar">
        <button type="submit" class="btn-go">Submit for review</button>
        <a class="btn-outline" href="/">Cancel</a>
        <span id="status" class="muted" style="margin-left: .5rem;"></span>
      </div>
    </form>
  </div>
</div>

<script>
function buildIso(dateStr, timeStr) {
  if (!dateStr) return null;
  const t = timeStr || '00:00';
  return new Date(dateStr + 'T' + t).toISOString();
}

document.getElementById('seminar-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const status = document.getElementById('status');
  const session = window.tbSession;
  if (!session) { status.textContent = ''; openModal('modal-login'); return; }
  const fd = new FormData(e.target);
  const body = {};
  for (const [k, v] of fd.entries()) {
    if (v === '') continue;
    if (k === 'gi_required') body[k] = (v === 'true');
    else if (k === 'cost_usd' || k === 'max_attendees') body[k] = Number(v);
    else body[k] = v;
  }
  const startIso = buildIso(document.getElementById('event_date').value, document.getElementById('start_time').value);
  if (!startIso) { status.textContent = '✗ date is required'; return; }
  body.start_datetime = startIso;
  const endIso = buildIso(document.getElementById('end_date').value || document.getElementById('event_date').value,
                          document.getElementById('end_time').value);
  if (endIso && endIso !== startIso) body.end_datetime = endIso;

  status.textContent = 'Submitting…';
  try {
    const r = await fetch('/api/seminars', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer ' + session.access_token},
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (d.ok) {
      status.textContent = '✓ Submitted! Redirecting…';
      setTimeout(() => location.href = '/seminar/' + d.slug, 800);
    } else {
      status.textContent = '✗ ' + (d.error || 'Submission failed');
    }
  } catch(err) { status.textContent = '✗ network error'; }
});
</script>
{% endblock %}
