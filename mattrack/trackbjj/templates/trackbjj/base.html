<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c0392b">
  <title>{% block title %}TrackBJJ{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0f0f1a;
      --card:   #1e1e30;
      --gray:   #2d2d44;
      --text:   #f0f0f0;
      --muted:  #777799;
      --border: #333355;
      --accent: #c0392b;
      --gold:   #ffd700;
      --silver: #c0c0c0;
      --bronze: #cd7f32;
      --green:  #27ae60;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; }

    /* ── Tags ── */
    .tag {
      display: inline-block; font-size: .65rem; padding: .15rem .5rem;
      border-radius: 3px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    }
    .tag-ibjjf   { background: rgba(76,175,80,.15);   color: #4caf50; }
    .tag-sc      { background: rgba(123,140,222,.15);  color: #7b8cde; }
    .tag-naga    { background: rgba(229,115,115,.15);  color: #e57373; }
    .tag-compnet { background: rgba(77,208,225,.15);   color: #4dd0e1; }
    .tag-adcc    { background: rgba(255,183,77,.15);   color: #ffb74d; }
    .tag-ajp     { background: rgba(102,187,106,.15);  color: #66bb6a; }
    .tag-uaejjf  { background: rgba(239,154,154,.15);  color: #ef9a9a; }
    .tag-sjjif   { background: rgba(255,204,128,.15);  color: #ffcc80; }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th {
      text-align: left; color: var(--muted); font-weight: 600; font-size: .72rem;
      text-transform: uppercase; letter-spacing: .07em;
      padding: .5rem .6rem; border-bottom: 1px solid var(--border);
    }
    td { padding: .55rem .6rem; border-bottom: 1px solid var(--bg); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray); }

    /* ── Section titles ── */
    .section-title {
      font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
      color: var(--muted); margin: 2rem 0 .75rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Medal colours ── */
    .place-1 { color: var(--gold);   font-weight: 700; }
    .place-2 { color: var(--silver); font-weight: 700; }
    .place-3 { color: var(--bronze); font-weight: 700; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
